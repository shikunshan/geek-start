version: "3.8"

services:
  geek-start:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geek-start
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.siliconflow.cn/v1}
      - LLM_MODEL=${LLM_MODEL:-Qwen/Qwen2.5-7B-Instruct}
      - LLM_SYSTEM_PROMPT=${LLM_SYSTEM_PROMPT:-}
    # volumes:
    # 可选：持久化存储（如果需要）
    # - ./data:/app/data
    networks:
      - shared-net
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  shared-net:
    external: true
